<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>インテリア厳選アイテム</title>
<meta name="description" content="インテリアバイヤーが厳選した楽天アイテム一覧">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf9;color:#1c1c1c;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e8e4e0;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:10}
header h1{font-size:15px;font-weight:700;letter-spacing:.08em;color:#1c1c1c}
header p{font-size:12px;color:#888;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px;max-width:900px;margin:0 auto}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:16px;padding:20px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-link{display:block;text-decoration:none;color:inherit;height:100%;display:flex;flex-direction:column}
.img-wrap{aspect-ratio:1;overflow:hidden;background:#f0ece8}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .img-wrap img{transform:scale(1.04)}
.no-img{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:12px}
.body{padding:10px 10px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.hook{font-size:12px;color:#555;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.name{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:auto}
.price{font-size:13px;font-weight:700;color:#e03}
.shop{font-size:11px;color:#999;margin-left:2px}
.cta{display:inline-block;margin-top:8px;background:#bf0000;color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:5px;text-align:center;letter-spacing:.04em}
footer{text-align:center;padding:32px 20px;font-size:11px;color:#bbb}
footer a{color:#999;text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>インテリア厳選アイテム</h1>
  <p>Instagram @episo_interior でご紹介した厳選アイテム</p>
</header>
<main class="grid">

  <article class="card">
    <a href="https://hb.afl.rakuten.co.jp/hgc/g00qo77n.fs2ds28b.g00qo77n.fs2dtd02/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Fwtw-cctv-camera%2Fwtw-ipw108%2F&m=http%3A%2F%2Fm.rakuten.co.jp%2Fwtw-cctv-camera%2Fi%2F10000924%2F&rafcid=wsc_i_is_6c0cc9c5-a165-49bb-8ba5-065a84ed6b2b" target="_blank" rel="noopener noreferrer" class="card-link">
      <div class="img-wrap"><img src="https://thumbnail.image.rakuten.co.jp/@0_mall/wtw-cctv-camera/cabinet/ipcam/miteru/imgrc0187293160.jpg?_ex=128x128" alt="現在4年連続1位 創業48年日本自社工場開発生産 みてるちゃん 500万 温度計" loading="lazy"></div>
      <div class="body">
        <p class="hook">赤ちゃんのいる部屋に、静かに寄り添うカメラ。</p>
        <p class="name">現在4年連続1位 創業48年日本自社工場開発生産 みてるちゃん 500万 温度計</p>
        <div class="meta"><span class="price">¥3,280</span><span class="shop">WTW 塚本無線</span></div>
        <span class="cta">楽天で見る →</span>
      </div>
    </a>
  </article>
</main>
<footer>
  <p>更新: 2026/06/07 12:09 &nbsp;|&nbsp; <a href="https://www.instagram.com/" target="_blank">@episo_interior</a></p>
  <p style="margin-top:6px">※当ページのリンクはアフィリエイトリンクを含みます</p>
</footer>
</body>
</html>
